<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Geek Room</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Override body for login page - no scroll needed */
    body { overflow: hidden; }
    @media (max-height: 600px) { body { overflow: auto; } }

    /* Animated grid background specific to login */
    .login-grid-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove { from { background-position: 0 0; } to { background-position: 50px 50px; } }

    /* Scanline effect */
    .login-scanlines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
    }

    /* Terminal-style decorative text */
    .terminal-line {
      position: fixed; bottom: 24px; left: 32px;
      font-size: 11px; color: rgba(0,255,231,0.2);
      font-family: var(--font-body);
      letter-spacing: 0.08em;
      z-index: 0; pointer-events: none;
      white-space: nowrap;
    }
    @media (max-width: 600px) { .terminal-line { display: none; } }

    /* System badge */
    .system-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,255,231,0.05);
      border: 1px solid rgba(0,255,231,0.1);
      border-radius: 100px; padding: 5px 14px;
      font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim);
      margin: 0 auto 24px; width: fit-content;
    }
    .system-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s ease infinite; }

    .login-page { position: relative; z-index: 1; }
  </style>
</head>
<body>

  <!-- No page loader on login — instant feel -->

  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <!-- Animated canvas background (simpler for login) -->
  <canvas id="bg-canvas" style="opacity:0.35;"></canvas>
  <div class="login-grid-bg"></div>
  <div class="login-scanlines"></div>

  <!-- Corner terminal text -->
  <div class="terminal-line" id="terminal-text">
    > GEEK ROOM SECURE PORTAL v2.4.1 · AUTHENTICATION REQUIRED · AES-256 ENCRYPTED
  </div>

  <!-- NAVBAR (minimal for login) -->
  <nav class="navbar scrolled" style="background: rgba(3,8,15,0.5);">
    <a href="index.html" class="nav-logo">
      <span class="logo-bracket">[</span>GEEK<span>&nbsp;ROOM</span><span class="logo-bracket">]</span>
    </a>
    <div class="nav-links" style="display:flex;">
      <a href="index.html">← Back to Home</a>
    </div>
  </nav>

  <!-- LOGIN CARD -->
  <div class="login-page" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:100px 20px 40px;">
    <div class="login-bg-rings">
      <div class="login-ring"></div>
      <div class="login-ring"></div>
      <div class="login-ring"></div>
      <div class="login-ring"></div>
    </div>

    <div class="login-card">

      <div class="login-logo">
        <div class="login-logo-text glitch" data-text="GEEK ROOM">GEEK ROOM</div>
        <div class="login-logo-sub">MEMBER PORTAL</div>
      </div>

      <div class="system-badge">
        <span class="system-dot"></span>
        SYSTEM ONLINE · SECURE CONNECTION
      </div>

      <div class="login-title">ACCESS YOUR ACCOUNT</div>

      <form id="login-form" novalidate>
        <div class="form-group" style="margin-bottom:18px;">
          <label class="form-label" for="login-email">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input class="form-input-icon" type="email" id="login-email" placeholder="you@bpit.edu.in" required autocomplete="email" />
          </div>
        </div>

        <div class="form-group" style="margin-bottom:6px;">
          <label class="form-label" for="login-password">Password</label>
          <div class="input-icon-wrap" style="position:relative;">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <input class="form-input-icon" type="password" id="login-password" placeholder="••••••••••••" required autocomplete="current-password" id="pwInput" />
            <span id="togglePw" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:none;color:var(--text-dim);font-size:12px;letter-spacing:0.05em;transition:color 0.2s;" onclick="togglePassword()">SHOW</span>
          </div>
        </div>

        <div class="login-options">
          <label class="login-check">
            <input type="checkbox" /> Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login">⚡ LOGIN TO GEEK ROOM</button>

        <div class="login-divider">OR CONTINUE WITH</div>

        <div class="login-socials">
          <button type="button" class="login-social-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button type="button" class="login-social-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
            GitHub
          </button>
        </div>

        <div class="login-footer">
          Not a member yet? <a href="contact.html">Join Geek Room →</a>
        </div>
      </form>

    </div>
  </div>

  <script src="main.js"></script>
  <script>
    function togglePassword() {
      const inp = document.getElementById('login-password');
      const btn = document.getElementById('togglePw');
      if (!inp) return;
      const isHidden = inp.type === 'password';
      inp.type = isHidden ? 'text' : 'password';
      btn.textContent = isHidden ? 'HIDE' : 'SHOW';
    }

    // Animated terminal text
    const msgs = [
      '> GEEK ROOM SECURE PORTAL v2.4.1 · AUTHENTICATION REQUIRED · AES-256 ENCRYPTED',
      '> SYSTEM STATUS: ONLINE · UPTIME: 99.99% · MEMBERS ACTIVE: 247',
      '> WELCOME BACK, DEVELOPER · PLEASE AUTHENTICATE TO CONTINUE'
    ];
    let mi = 0;
    setInterval(() => {
      mi = (mi + 1) % msgs.length;
      const el = document.getElementById('terminal-text');
      if (el) el.textContent = msgs[mi];
    }, 4000);
  </script>
</body>
</html>
